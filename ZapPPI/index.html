<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Chat IFRN</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1> Uátiszap</h1>
</header>

<main>
  <div id="login">
    <h2>Login</h2>
    <input type="text" id="user" placeholder="Usuário">
    <input type="password" id="pass" placeholder="Senha">
    <button onclick="login()">Entrar</button>
    <p id="error"></p>
  </div>

  <div id="chat-area" class="hidden">
    <h2>Área de Chat</h2>
    <select id="chatSelect" onchange="loadChat()">
      <option value="chat1">Queridissímo e dignissimo mestre Marcelo Júnior</option>
      <option value="chat2">Mãe</option>
    </select>

    <div id="messages"></div>

    <input type="text" id="msg" placeholder="Digite sua mensagem">
    <button onclick="sendMessage()">Enviar</button>
  </div>

  <div id="dev">
    <h2>Desenvolvedores</h2>
    <p>Margarida Gabriela - INFO4M</p>
   <p>Cássia Reveillianny - INFO4M</p>
   <p>Maria Eduarda - INFO4M</p>
   <p>Maria Geovana - INFO4M</p>
  </div>
<div id="tech">
  <h2>Tecnologias</h2>
  <p>
    <a href="https://developer.mozilla.org/pt-BR/docs/Web/HTML" target="_blank">HTML</a>, 
    <a href="https://developer.mozilla.org/pt-BR/docs/Web/CSS" target="_blank">CSS</a>, 
    <a href="https://developer.mozilla.org/pt-BR/docs/Web/JavaScript" target="_blank">JavaScript</a>
  </p>
</div>
</main>
 

<footer>
    <div class="ifrn-box"></div>
  <img src="img.if.png" width="50">
  <p>IFRN campus Santa Cruz</p>
  <p>Trabalho de Programação para Internet</p>
  <p>Prof. Marcelo Figueiredo Barbosa Júnior</p>
</footer>

<script src="script.js"></script>
</body>
</html>
